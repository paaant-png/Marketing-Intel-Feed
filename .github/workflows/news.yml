name: Daily Marketing Intel

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

# Force the environment to use Node 24 configurations safely
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Fetch Latest Intelligence
        run: python news_scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated update: Daily Marketing Intel"
          git push
